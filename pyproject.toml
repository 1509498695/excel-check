[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".runtime",
  ".venv",
  "backend/.runtime",
  "backend/.runtime_uploads",
  "docs/archive",
  "frontend",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"backend/run.py" = ["E402"]
"backend/tests/conftest.py" = ["E402"]
